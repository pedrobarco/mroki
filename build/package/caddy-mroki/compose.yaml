services:
  caddy-mroki:
    build:
      context: ../../..
      dockerfile: build/package/caddy-mroki/Dockerfile
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
