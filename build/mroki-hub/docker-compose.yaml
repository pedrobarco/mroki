services:
  db:
    extends:
      file: ../mroki-api/docker-compose.yaml
      service: db

  mroki-api:
    build:
      context: ../..
      dockerfile: build/mroki-api/Dockerfile
    ports:
      - "8090:8090"
    environment:
      MROKI_APP_PORT: 8090
      MROKI_APP_DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
      MROKI_APP_API_KEY: mroki-dev-api-key-16
      MROKI_APP_CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  mroki-agent:
    build:
      context: ../..
      dockerfile: build/mroki-agent/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MROKI_APP_PORT: 8080
      MROKI_APP_API_URL: http://mroki-api:8090
      MROKI_APP_API_KEY: mroki-dev-api-key-16
      MROKI_APP_GATE_ID: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    depends_on:
      mroki-api:
        condition: service_healthy
