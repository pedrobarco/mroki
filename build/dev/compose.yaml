services:
  mroki-db:
    extends:
      file: ../package/mroki-db/compose.yaml
      service: mroki-db
    environment:
      POSTGRES_PASSWORD: postgres

  mroki-db-migrator:
    extends:
      file: ../package/mroki-db-migrator/compose.yaml
      service: mroki-db-migrator
    command:
      - "--url"
      - postgres://postgres:postgres@mroki-db:5432/postgres?sslmode=disable
    depends_on:
      mroki-db:
        condition: service_healthy

  mroki-db-seed:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./seed.sql:/seed.sql:ro
    command:
      - psql
      - "-h"
      - mroki-db
      - "-U"
      - postgres
      - "-d"
      - postgres
      - "-v"
      - ON_ERROR_STOP=1
      - "-f"
      - /seed.sql
    depends_on:
      mroki-db-migrator:
        condition: service_completed_successfully
    restart: "no"

  mroki-api:
    extends:
      file: ../package/mroki-api/compose.yaml
      service: mroki-api
    profiles: [backend, frontend]
    environment:
      MROKI_APP_PORT: 8090
      MROKI_APP_DATABASE_URL: postgres://postgres:postgres@mroki-db:5432/postgres
      MROKI_APP_API_KEY: mroki-dev-api-key-16
      MROKI_APP_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      mroki-db:
        condition: service_healthy
      mroki-db-seed:
        condition: service_completed_successfully

  mroki-proxy:
    extends:
      file: ../package/mroki-proxy/compose.yaml
      service: mroki-proxy
    profiles: [backend]
    environment:
      MROKI_APP_API_URL: http://mroki-api:8090
      MROKI_APP_API_KEY: mroki-dev-api-key-16
      MROKI_APP_GATE_ID: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    depends_on:
      mroki-api:
        condition: service_healthy

  mroki-hub:
    extends:
      file: ../package/mroki-hub/compose.yaml
      service: mroki-hub
    profiles: [frontend]
    environment:
      MROKI_APP_API_BASE_URL: http://localhost:8090
      MROKI_APP_API_KEY: mroki-dev-api-key-16
    depends_on:
      mroki-api:
        condition: service_healthy

  prometheus:
    extends:
      file: ./prometheus/compose.yaml
      service: prometheus
    profiles: [telemetry]

  grafana:
    extends:
      file: ./grafana/compose.yaml
      service: grafana
    profiles: [telemetry]
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  mroki-db-data: