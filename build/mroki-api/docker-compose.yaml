services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../../ent/migrate/migrations:/migrations:ro
      - ./init-db.sh:/docker-entrypoint-initdb.d/00-init-db.sh:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/99-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
