default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-mod-tidy-repo

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: deployments/kubernetes/charts/.*/templates/
        stages: [pre-commit]
      - id: check-json
        exclude: tsconfig.*\.json$
        stages: [pre-commit]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Vue/TypeScript linting and formatting for mroki-hub
  - repo: local
    hooks:
      - id: mroki-hub-prettier
        name: Format mroki-hub (Prettier)
        entry: bash -c 'cd web/mroki-hub && pnpm format'
        language: system
        files: ^web/mroki-hub/src/.*\.(vue|ts|js|json|css|scss|md)$
        pass_filenames: false
        stages: [pre-commit]

      - id: mroki-hub-eslint
        name: Lint mroki-hub (ESLint)
        entry: bash -c 'cd web/mroki-hub && pnpm lint'
        language: system
        files: ^web/mroki-hub/src/.*\.(vue|ts|js)$
        pass_filenames: false
        stages: [pre-commit]
