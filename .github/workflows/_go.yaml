name: go

on:
  workflow_call:

jobs:
  lint-build-test:
    name: lint-build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./cmd/mroki-api/... ./internal/... ./pkg/...

      - name: Build mroki-api
        run: CGO_ENABLED=0 go build -o bin/mroki-api ./cmd/mroki-api

      - name: Build mroki-proxy
        run: CGO_ENABLED=0 go build -o bin/mroki-proxy ./cmd/mroki-proxy

      - name: Upload coverage
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
