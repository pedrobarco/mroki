name: setup-go
description: Install Go and cache modules

inputs:
  go-version:
    description: Go version to install
    required: false
    default: "1.26"

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: go.sum

    - name: Download modules
      shell: bash
      run: go mod download
