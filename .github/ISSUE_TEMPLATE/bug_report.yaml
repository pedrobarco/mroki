name: Bug Report
description: Report a bug or unexpected behavior in mroki.
labels: ["bug"]
title: "fix(<scope>): <short description>"
body:
  - type: markdown
    attributes:
      value: |
        **Title convention:** Use `type(scope): description` (Conventional Commits).
        - **type**: usually `fix` for bugs; other types are `feat`, `docs`, `test`, `ci`, `refactor`, `chore`, `perf`
        - **scope**: matches the Component below — `api`, `proxy`, `hub`, `caddy`, `infra`
        - Example: `fix(proxy): prevent panic on nil request body`
  - type: checkboxes
    id: search
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues and this hasn't been reported yet
          required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure gate with ...
        2. Send request to ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      multiple: true
      options:
        - api
        - proxy
        - hub
        - caddy
        - infra
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: mroki version
      description: Output of the image tag or binary version you're running.
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Kubernetes / Helm
        - Binary
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or config
      description: Paste any relevant log output or configuration (redact secrets).
      render: shell
    validations:
      required: false
