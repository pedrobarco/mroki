version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mroki_dev_password
      POSTGRES_DB: mroki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # mroki API server
  mroki-api:
    image: mroki-api:latest
    ports:
      - "8081:8081"
    environment:
      MROKI_APP_PORT: 8081
      MROKI_APP_DATABASE_URL: postgres://postgres:mroki_dev_password@postgres:5432/mroki
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # mroki agent/proxy
  mroki-agent:
    image: mroki-agent:latest
    ports:
      - "8080:8080"
    environment:
      # Replace with your actual service URLs
      MROKI_APP_LIVE_URL: https://jsonplaceholder.typicode.com
      MROKI_APP_SHADOW_URL: https://jsonplaceholder.typicode.com
      MROKI_APP_PORT: 8080
      MROKI_APP_API_URL: http://mroki-api:8081
      # Create a gate first, then use its ID here
      MROKI_APP_GATE_ID: 00000000-0000-0000-0000-000000000000
    depends_on:
      mroki-api:
        condition: service_healthy

volumes:
  postgres_data:
