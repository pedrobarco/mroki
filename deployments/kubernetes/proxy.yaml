apiVersion: apps/v1
kind: Deployment
metadata:
  name: mroki-proxy
  namespace: mroki
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mroki-proxy
  template:
    metadata:
      labels:
        app: mroki-proxy
    spec:
      containers:
      - name: mroki-proxy
        image: mroki-proxy:v1.0.0
        ports:
        - containerPort: 8080
        env:
        - name: MROKI_APP_LIVE_URL
          valueFrom:
            configMapKeyRef:
              name: mroki-config
              key: live-url
        - name: MROKI_APP_SHADOW_URL
          valueFrom:
            configMapKeyRef:
              name: mroki-config
              key: shadow-url
        - name: MROKI_APP_PORT
          value: "8080"
        - name: MROKI_APP_API_URL
          value: "http://mroki-api"
        - name: MROKI_APP_GATE_ID
          valueFrom:
            configMapKeyRef:
              name: mroki-config
              key: gate-id
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mroki-proxy
  namespace: mroki
spec:
  selector:
    app: mroki-proxy
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
