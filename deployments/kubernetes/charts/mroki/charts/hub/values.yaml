# -- Number of replicas
replicaCount: 2

image:
  # -- Image registry
  registry: ghcr.io
  # -- Image repository
  repository: pedrobarco/mroki/mroki-hub
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""

# -- Name of an existing Secret containing MROKI_API_KEY
existingSecret: ""

# -- API base URL (empty = auto-discover via release-name-api service)
apiBaseUrl: ""

# -- Additional environment variables
extraEnv: []

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Override ServiceAccount name
  name: ""

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

containerPort: 80

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: mroki.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS
  tls: []

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# -- Pod annotations
podAnnotations: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity
affinity: {}
