# -- Number of replicas
replicaCount: 2

image:
  # -- Image registry
  registry: ghcr.io
  # -- Image repository
  repository: pedrobarco/mroki/mroki-hub
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""

# -- Name of an existing Secret containing MROKI_APP_API_KEY
existingSecret: ""

# -- API base URL (empty = auto-discover via release-name-api service)
apiBaseUrl: ""

# -- Additional environment variables
extraEnv: []

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context. The hub serves on port 80, so
# NET_BIND_SERVICE is added back after dropping all capabilities.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Override ServiceAccount name
  name: ""

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

containerPort: 80

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: mroki.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS
  tls: []

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# -- Pod annotations
podAnnotations: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity
affinity: {}
