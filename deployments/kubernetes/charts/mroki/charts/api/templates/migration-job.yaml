{{- if and .Values.migration.enabled (or .Values.existingSecret .Values.database.passwordSecret) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "api.fullname" . }}-migrate
  labels:
    {{- include "api.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrator
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/component: db-migrator
    spec:
      serviceAccountName: {{ include "api.serviceAccountName" . }}
      restartPolicy: Never
      containers:
        - name: db-migrator
          image: {{ include "api.migrationImage" . }}
          imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
          args:
            - "--url"
            - "$(MROKI_APP_DATABASE_URL)"
            {{- with .Values.migration.baseline }}
            - "--baseline"
            - {{ . | quote }}
            {{- end }}
          env:
            {{- include "api.databaseEnv" . | nindent 12 }}
          {{- with .Values.migration.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
