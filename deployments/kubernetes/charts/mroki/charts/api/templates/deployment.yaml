apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "api.serviceAccountName" . }}
      {{- if and .Values.migration.enabled (or .Values.existingSecret .Values.database.passwordSecret) }}
      initContainers:
        - name: db-migrator
          image: {{ include "api.migrationImage" . }}
          imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
          args:
            - "--url"
            - "$(MROKI_APP_DATABASE_URL)"
          env:
            {{- include "api.databaseEnv" . | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: MROKI_APP_PORT
              value: {{ .Values.containerPort | quote }}
            {{- if or .Values.existingSecret .Values.database.passwordSecret }}
            {{- include "api.databaseEnv" . | nindent 12 }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: MROKI_APP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: api-key
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
