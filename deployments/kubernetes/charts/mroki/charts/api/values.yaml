# -- Number of replicas
replicaCount: 3

image:
  # -- Image registry
  registry: ghcr.io
  # -- Image repository
  repository: pedrobarco/mroki/mroki-api
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""

migration:
  # -- Enable the database migration pre-install/pre-upgrade Job hook
  enabled: true
  image:
    # -- Migration image registry
    registry: ghcr.io
    # -- Migration image repository
    repository: pedrobarco/mroki/mroki-db-migrator
    # -- Migration image pull policy
    pullPolicy: IfNotPresent
    # -- Overrides the migration image tag (default is the chart appVersion)
    tag: ""
  # -- Baseline migration version for pre-existing databases not yet tracked by
  # Atlas (e.g. previously managed by Ent auto-migration). Leave empty for fresh
  # installs. When set, migrations up to this version are marked as applied
  # without being re-executed.
  baseline: ""
  # -- Number of retries before the migration Job is considered failed
  backoffLimit: 3
  # -- Resource requests/limits for the migration Job
  resources: {}

# -- Name of an existing Secret containing MROKI_APP_API_KEY and MROKI_APP_DATABASE_URL
existingSecret: ""

# -- Database connection fields (used when existingSecret is not set)
database:
  # -- Database host (defaults to {{ .Release.Name }}-postgresql)
  host: ""
  # -- Database port
  port: 5432
  # -- Database name
  name: "mroki"
  # -- Database user
  user: "mroki"
  # -- Name of an existing Secret containing the database password
  passwordSecret: ""
  # -- Key in the password Secret
  passwordSecretKey: "password"
  # -- SSL mode
  sslmode: "disable"

# -- Additional environment variables
extraEnv: []

# -- Pod-level security context (applied to the Deployment and the migration Job)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context (applied to the Deployment and the migration Job)
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Override ServiceAccount name
  name: ""

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

containerPort: 8090

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum replicas
  minReplicas: 2
  # -- Maximum replicas
  maxReplicas: 10
  # -- Target CPU utilization
  targetCPUUtilizationPercentage: 80

# -- Pod annotations
podAnnotations: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity
affinity: {}
